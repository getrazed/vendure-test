name: Assignment 3 Experimental Tests

on:
  workflow_dispatch:
  push:
    paths:
      - 'scripts/assignment3/**'
      - 'packages/core/e2e/fixtures/test-payment-methods.ts'
      - '.github/workflows/assignment3_experimental_tests.yml'

env:
  CI: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  assignment3-experiments:
    name: Run Performance Mutation Chaos Experiments
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup
      - name: Build core dependencies
        run: npm run build:core-common
      - name: Run Assignment 3 performance
        run: npm run assignment3:performance
      - name: Run Assignment 3 mutation
        run: npm run assignment3:mutation
      - name: Run Assignment 3 chaos
        run: npm run assignment3:chaos
      - name: Upload Assignment 3 artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: assignment3-artifacts-${{ github.run_id }}
          path: assignment3/artifacts/*.json
          if-no-files-found: error
      - name: Publish summary
        if: always()
        run: |
          echo "## Assignment 3 Experiment Run" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- Workflow: \`assignment3_experimental_tests.yml\`" >> $GITHUB_STEP_SUMMARY
          echo "- Artifacts: \`assignment3/artifacts/performance-results.json\`, \`assignment3/artifacts/mutation-results.json\`, \`assignment3/artifacts/chaos-results.json\`" >> $GITHUB_STEP_SUMMARY
          echo "- Trigger: \`${{ github.event_name }}\`" >> $GITHUB_STEP_SUMMARY
